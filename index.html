<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Твои реальные координаты в метаданных проекта -->
    <meta name="geo.position" content="47.9793580;33.4382860">
    <title>A-Frame VR Scene</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

    <!-- Убираем любые сторонние окружения, оставляем только чистую сцену -->
    <a-scene graphic-settings="colorManagement: true">
        
        <!-- Менеджер ресурсов: загружаем твои .glb модели -->
        <a-assets>
            <a-asset-item id="cinnamoroll" src="./cinnamoroll.glb"></a-asset-item>
            <a-asset-item id="sunna" src="./sunna_zzz.glb"></a-asset-item>
        </a-assets>

        <!-- Нежное светлое небо вместо зеленого тумана -->
        <a-sky color="#fff5f7"></a-sky>

        <!-- Та самая розовая платформа (земля) -->
        <a-plane 
            position="0 0 0" 
            rotation="-90 0 0" 
            width="30" 
            height="30" 
            color="#ffb6c1">
        </a-plane>

        <!-- Камера игрока -->
        <a-entity camera look-controls position="0 1.6 0"></a-entity>

        <!-- Модель 1: Cinnamoroll (Слева от тебя) -->
        <a-entity 
            gltf-model="#cinnamoroll" 
            position="-2.5 0 -3.5" 
            scale="1 1 1"
            rotation="0 35 0">
        </a-entity>

        <!-- Модель 2: Sunna (Справа от тебя) -->
        <a-entity 
            gltf-model="#sunna" 
            position="2.5 0 -3.5" 
            scale="1 1 1"
            rotation="0 -35 0">
        </a-entity>

        <!-- Пасхалка: Твои координаты красивым текстом прямо по центру сцены -->
        <a-text 
            value="My Coord: 47.979358, 33.438286" 
            position="0 2.5 -4" 
            align="center" 
            color="#4a4a4a" 
            width="4">
        </a-text>

        <!-- Хорошее, чистое освещение без зеленых рефлексов -->
        <a-entity light="type: ambient; color: #ffffff; intensity: 0.9"></a-entity>
        <a-entity light="type: directional; color: #ffffff; intensity: 0.5" position="1 3 2"></a-entity>

    </a-scene>

</body>
</html>
