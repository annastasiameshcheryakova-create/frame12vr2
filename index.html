<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>AR Location Scene</title>
        <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
        <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js'></script>
        <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js'></script>
    </head>
    <body style="margin: 0; overflow: hidden;">
        <a-scene 
            vr-mode-ui="enabled: false" 
            arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false" 
            renderer="antialias: true; alpha: true">
            
            <a-assets>
                <a-asset-item id="model-cinna" src="cinnamoroll.glb"></a-asset-item>
                <a-asset-item id="model-unu" src="unu.glb"></a-asset-item>
            </a-assets>

            <a-camera gps-new-camera="gpsMinDistance: 5"></a-camera>

            <a-entity 
                gltf-model="#model-cinna"
                gps-new-entity-place="latitude: 47.9792270754015; longitude:33.438655133455896" 
                scale="4 4 4">
            </a-entity>

            <a-entity 
                gltf-model="#model-unu"
                gps-new-entity-place="latitude: 47.9792270754015; longitude:33.438655133455896" 
                scale="4 4 4">
            </a-entity>

        </a-scene>
    </body>
</html>
