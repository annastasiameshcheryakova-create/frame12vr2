<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Frame VR Scene</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

    <a-scene>
        <a-assets>
            <a-asset-item id="cinnamoroll" src="./cinnamoroll.glb"></a-asset-item>
            <a-asset-item id="sunna" src="./sunna_zzz.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#f4effa"></a-sky>

        <a-plane 
            position="0 0 0" 
            rotation="-90 0 0" 
            width="50" 
            height="50" 
            color="#ffb6c1">
        </a-plane>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

        <a-entity 
            gltf-model="#cinnamoroll" 
            position="-2 0 -4" 
            scale="1 1 1"
            rotation="0 45 0">
        </a-entity>

        <a-entity 
            gltf-model="#sunna" 
            position="2 0 -4" 
            scale="1 1 1"
            rotation="0 -45 0">
        </a-entity>

        <a-entity light="type: ambient; color: #ffffff; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; color: #fff; intensity: 0.6" position="-0.5 1 1"></a-entity>

    </a-scene>

</body>
</html>
