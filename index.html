<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Frame Scene with 3D Models</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

    <a-scene>
        <a-assets>
            <a-asset-item id="model-left" src="cinnamoroll.glb"></a-asset-item>
            <a-asset-item id="model-right" src="sunna_zzz.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#f6eff7"></a-sky>

        <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#e2d4e7"></a-plane>

        <a-gltf-model 
            src="#model-left" 
            position="-3 0.5 -4" 
            scale="1 1 1"
            rotation="0 45 0">
        </a-gltf-model>

        <a-gltf-model 
            src="#model-right" 
            position="3 0.5 -4" 
            scale="1 1 1"
            rotation="0 -45 0">
        </a-gltf-model>

        <a-entity position="0 1.6 0">
            <a-camera look-controls wasd-controls></a-camera>
        </a-entity>

        <a-entity light="type: ambient; color: #ffffff; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; color: #ffffff; intensity: 0.6" position="-1 4 2"></a-entity>

    </a-scene>

</body>
</html>
